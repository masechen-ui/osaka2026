<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 京阪回憶製造所 - Version 1.11</title>
    <!-- 強制套用 Noto Sans TC 字型 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            /* 統一字型 */
            font-family: 'Noto Sans TC', Arial, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #fff9f5;
            background-image: radial-gradient(#ffe4e6 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* 01.html 的經典樣式 */
        .tab-active {
            background-color: #ffc1cc !important;
            color: white !important;
            border-color: #ff8fa3 !important;
            box-shadow: 0 4px 6px -1px rgba(255, 143, 163, 0.5);
        }
        .strikethrough {
            text-decoration: line-through;
            color: #9ca3af;
        }
        input[type="checkbox"] {
            accent-color: #f472b6;
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }
        .spot-card {
            border-left: 2px solid #ffccd5;
            margin-left: 12px;
            padding-left: 24px;
            padding-bottom: 32px;
            position: relative;
        }
        .spot-card::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 0;
            width: 12px;
            height: 12px;
            background: #ff8fa3;
            border-radius: 50%;
            border: 2px solid white;
        }
        .img-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #eee;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        /* 美化捲軸並確保手機版滑動 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('entry');
            const [jpyAmount, setJpyAmount] = useState('');
            const [twdAmount, setTwdAmount] = useState('');
            const exchangeRate = 0.21;

            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('trip_checklist_v1.11');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => {
                localStorage.setItem('trip_checklist_v1.11', JSON.stringify(checkedItems));
            }, [checkedItems]);

            const toggleCheck = (id) => {
                setCheckedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const checklistData = [
                {
                    category: "📄 必帶證件與通訊",
                    items: [
                        { id: 'c1', text: "護照正本 (檢查效期 > 6個月)" },
                        { id: 'c2', text: "Visit Japan Web 截圖 (QR Code)" },
                        { id: 'c3', text: "日本網路 eSIM/SIM 卡 (確認已啟用)" },
                        { id: 'c4', text: "保險證明文件 (影本/PDF)" }
                    ]
                },
                {
                    category: "💰 金融與票券",
                    items: [
                        { id: 'c5', text: "日幣現鈔 (建議換些小額與住宿稅)" },
                        { id: 'c6', text: "信用卡 (JCB 最好用，多備一張 Visa)" },
                        { id: 'c7', text: "iPhone 已加入 ICOCA/Suica" },
                        { id: 'c8', text: "大阪周遊卡 (Day 4 用)" }
                    ]
                },
                {
                    category: "💊 生活與常備",
                    items: [
                        { id: 'c9', text: "最舒適的運動鞋 (嚴禁穿新鞋!)" },
                        { id: 'c10', text: "感冒/退燒/腸胃藥/止痛藥" },
                        { id: 'c11', text: "行動電源 (大容量 20000mAh，限隨身)" },
                        { id: 'c12', text: "休足時間/蒸氣眼罩 (必備回血神器)" }
                    ]
                }
            ];

            const itinerary = [
                {
                    id: 'day1', day: 1, fullDate: "5/25 (一) 星期一", title: "啟程大阪 ＆ 動漫遊戲尋寶",
                    intensity: "輕鬆步行，約 6,000–8,000 步", budget: "約 1,310 日圓 (刷 ICOCA)", weather: "歷史平均 22°C - 26°C，初夏舒適", outfit: "短袖搭配一件穿脫方便的薄外套",
                    spots: [
                        { time: "05:20", name: "桃園機場 (TPE) 報到", icon: "🛫", desc: "長榮 BR132。早上為出境高峰，安檢人潮較多，建議提前 3 小時抵達。", price: "TPE T2", imgUrl: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=600", imgText: "桃園國際機場", imgSub: "TPE TERMINAL 2" },
                        { time: "11:55", name: "抵達關西機場 T1", icon: "🛬", desc: "辦理檢疫、入境查驗、領行李。預估 1.5 小時。", price: "KIX T1", imgUrl: "https://images.unsplash.com/photo-1570610159825-ec5d382d666b?w=600", imgText: "關西國際機場", imgSub: "ARRIVAL" },
                        { time: "13:30", name: "VIA INN 心齋橋 Check-in", icon: "🏨", map: "VIA INN Shinsaibashi", desc: "搭南海電鐵轉地鐵。至飯店寄放行李，現場需另付大阪住宿稅現金。", price: "車資 ¥930", imgUrl: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600", imgText: "大阪市區飯店", imgSub: "CHECK-IN" },
                        { time: "15:00", name: "日本橋電電城", icon: "🎮", map: "日本橋電電城", desc: "逛懷舊遊戲、動漫公仔。店家約 19:30 陸續打烊，請優先逛重點店鋪。", price: "免費", imgUrl: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600", imgText: "日本橋電電城", imgSub: "DEN DEN TOWN" },
                        { time: "18:00", name: "道頓堀固力果看板", icon: "📸", map: "道頓堀固力果", desc: "避開拉客陷阱！直接前往河邊步道仰拍跑跑人，角度好且人少。", price: "免費", imgUrl: "https://images.unsplash.com/photo-1617469165786-8007eda3caa7?w=600", imgText: "道頓堀打卡", imgSub: "DOTONBORI" },
                        { time: "20:00", name: "力丸燒肉 心齋橋店", icon: "🥩", map: "焼肉力丸心斎橋店", desc: "抵達日本的第一餐盛宴！國產牛吃到飽。", price: "¥4,488 / 人", note: "🚨 確切預約：CHEN Tim / 6位(兒童1) / 20:00 / 120分プレミアム", imgUrl: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=600", imgText: "日式燒肉", imgSub: "YAKINIKU" }
                    ],
                    food: ["北極星蛋包飯 (心齋橋本店)", "新世界串炸達摩 (心齋橋店)", "HARBS 水果千層蛋糕"],
                    backup: ["難波八阪神社 (大獅子頭)", "美國村 (古著街)"]
                },
                {
                    id: 'day2', day: 2, fullDate: "5/26 (火) 星期二", title: "嵐山絕景雙體驗 ＆ 心齋橋採購",
                    intensity: "中高強度，單趟車程近 2 小時", budget: "車資約 ¥1,880 (小火車與渡船另計)", weather: "上午峽谷氣溫稍低，下午市區悶熱", outfit: "短袖 ＋ 防風外套 (保津川水面風大容易冷)",
                    spots: [
                        { time: "08:00", name: "出發前往嵐山", icon: "🚄", desc: "從飯店搭地鐵至梅田，轉乘 JR 嵯峨野線至「JR 嵯峨嵐山站」。", price: "刷 ICOCA", imgUrl: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=600", imgText: "京都近郊", imgSub: "KYOTO" },
                        { time: "09:30", name: "嵯峨野觀光小火車", icon: "🚂", map: "小火車嵯峨站", desc: "搭乘復古小火車欣賞峽谷風光。", price: "¥880", note: "🚨 已預約 09:30 班次，請提前報到。", imgUrl: "https://images.unsplash.com/photo-1542931287-023b922fa89b?w=600", imgText: "觀光小火車", imgSub: "TOROKKO TRAIN" },
                        { time: "10:30", name: "保津川渡船 (2小時)", icon: "🛶", map: "保津川下り", desc: "由專業船夫撐篙，2 小時順流而下直達渡月橋。峽谷瀑布超美。", price: "¥6,000", imgUrl: "https://images.unsplash.com/photo-1511081692775-0574deb35da0?w=600", imgText: "保津川划船", imgSub: "RIVER BOAT" },
                        { time: "13:30", name: "嵐山散策", icon: "🎋", desc: "天龍寺、竹林小徑、渡月橋。下午茶推薦 % Arabica 咖啡。", price: "免費", imgUrl: "https://images.unsplash.com/photo-1544430243-3ef0736fbd3d?w=600", imgText: "嵐山竹林", imgSub: "BAMBOO GROVE" },
                        { time: "17:30", name: "心齋橋 PARCO/大丸", icon: "🧸", map: "心齋橋PARCO", desc: "朝聖吉伊卡哇 (PARCO 6F) 與 寶可夢中心 (大丸 9F)。", price: "採買預算自訂", note: "🚨 注意：日本百貨公司晚上 20:00 打烊！", imgUrl: "https://images.unsplash.com/photo-1563810145224-d2e8508e7df5?w=600", imgText: "百貨商圈", imgSub: "SHOPPING" }
                    ],
                    food: ["嵐山よしむら (蕎麥麵)", "鯛匠 HANANA (茶泡飯)", "嵯峨とうふ稻 (豆皮)", "新渡月 (烏龍麵)"],
                    backup: ["和服森林 (光林圓柱)", "老松和菓子 (夏柑糖)"]
                },
                {
                    id: 'day3', day: 3, fullDate: "5/27 (水) 星期三", title: "京都經典古都 ＆ 祇園花見小路",
                    intensity: "高強度步行，預估 18,000 - 20,000 步", budget: "約 ¥1,460 (持 ICOCA 轉乘)", weather: "京都盆地易悶熱，白天高溫恐逼近 30°C", outfit: "排汗透氣夏裝、防曬乳與最耐走的運動鞋",
                    spots: [
                        { time: "08:30", name: "伏見稻荷大社", icon: "🦊", map: "伏見稻荷大社", desc: "千本鳥居。請耐住性子往上走 15 分鐘至奧社，人潮會銳減，光影更美。", price: "免費", imgUrl: "https://images.unsplash.com/photo-1624253321171-1be53e12f5f4?w=600", imgText: "伏見稻荷", imgSub: "FUSHIMI INARI" },
                        { time: "12:30", name: "清水寺觀光 ＆ 午餐", icon: "🏮", map: "清水寺", desc: "必看清水舞台，並在二年坂、三年坂散策買生八橋伴手禮。", price: "¥400", imgUrl: "https://images.unsplash.com/photo-1545569341-9eb8b30979d9?w=600", imgText: "清水寺", imgSub: "KIYOMIZU-DERA" },
                        { time: "15:30", name: "祇園花見小路", icon: "🎎", map: "花見小路", desc: "傍晚的花街非常有氣氛，有機會遇見舞伎。", price: "免費", note: "🚨 攝影禁忌：未經允許於私人巷弄拍照罰款一萬日圓！", imgUrl: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=600", imgText: "花見小路", imgSub: "GION" }
                    ],
                    food: ["麵屋豬一 (必比登拉麵)", "名代豬排 Katsukura", "京極かねよ (厚蛋鰻魚丼)", "茶寮都路里 (抹茶)"],
                    backup: ["八坂庚申堂 (五彩許願猴)", "鴨川跳烏龜", "京都水族館 (雨天備案)"]
                },
                {
                    id: 'day4', day: 4, fullDate: "5/28 (木) 星期四", title: "大阪港灣 ＆ 新世界懷舊風",
                    intensity: "中度步行，市區內頻繁轉乘，約 12,000 步", budget: "車資 0 日圓 (使用大阪周遊卡 1 日券)", weather: "白天高溫約 26°C，大阪港灣區海風強", outfit: "洋蔥式穿搭。遊船吹海風時務必套上薄外套",
                    spots: [
                        { time: "10:15", name: "大阪海遊館", icon: "🐋", map: "海遊館", desc: "觀賞巨大的鯨鯊共游，全球最大級室內水族館。", price: "門票 ¥2,700", imgUrl: "https://images.unsplash.com/photo-1509230996354-1160fb738b9b?w=600", imgText: "海遊館", imgSub: "KAIYUKAN" },
                        { time: "13:30", name: "聖瑪麗亞號遊船", icon: "⛵", map: "聖瑪麗亞號", desc: "巡遊大阪港，持周遊卡免費搭乘。", price: "免費 (原 ¥1,600)", imgUrl: "https://images.unsplash.com/photo-1516939884455-1445c8652f83?w=600", imgText: "聖瑪麗亞號", imgSub: "CRUISE" },
                        { time: "14:30", name: "天保山大摩天輪", icon: "🎡", desc: "持周遊卡免費，可排透明車廂。", price: "免費", imgUrl: "https://images.unsplash.com/photo-1590272213161-59187372b6a5?w=600", imgText: "摩天輪", imgSub: "FERRIS WHEEL" },
                        { time: "15:40", name: "通天閣 ＆ 新世界", icon: "🗼", map: "通天閣", desc: "參觀大阪代表地標，並在下方的商店街吃串炸。", price: "免費 (原 ¥1,000)", imgUrl: "https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?w=600", imgText: "通天閣", imgSub: "TSUTENKAKU" }
                    ],
                    food: ["八重勝 串炸", "串炸達摩 (元祖串炸)", "大興壽司", "無鐵砲拉麵 (重口味)"],
                    backup: ["阿倍野 HARUKAS 300 展望台", "天王寺動物園"]
                },
                {
                    id: 'day5', day: 5, fullDate: "5/29 (金) 星期五", title: "晨間快閃 ＆ 滿載而歸",
                    intensity: "輕鬆，但需嚴格控管時程，避免錯過飛機", budget: "約 ¥1,500 (地鐵轉乘南海電鐵)", weather: "平均 25°C，梅雨季前夕請留意短暫陣雨", outfit: "寬鬆舒適的機場裝，方便機場安檢脫穿",
                    spots: [
                        { time: "09:15", name: "黑門市場早餐", icon: "🍣", map: "黑門市場", desc: "最後的海鮮巡禮，早上 9 點陸續營業。現烤神戶牛、生魚片。", price: "預算自訂", imgUrl: "https://images.unsplash.com/photo-1563810145224-d2e8508e7df5?w=600", imgText: "黑門市場", imgSub: "KUROMON MARKET" },
                        { time: "11:15", name: "啟程前往關西機場", icon: "🚋", map: "關西機場", desc: "最晚此時務必從心齋橋站出發。搭乘南海電鐵。", price: "車資 ¥930", note: "🚨 捷星在登機門前常會二次秤重，請在飯店先確認好手提 7kg！", imgUrl: "https://images.unsplash.com/photo-1569154941061-e231b4725ef1?w=600", imgText: "南海電鐵", imgSub: "TO AIRPORT" },
                        { time: "12:20", name: "捷星 GK55 報到", icon: "🛂", desc: "抵達機場辦理報到與安檢。出境人潮多，建議提早 3 小時抵達。", price: "機場免稅店", imgUrl: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=600", imgText: "機場安檢", imgSub: "SECURITY CHECK" },
                        { time: "14:50", name: "捷星 GK55 起飛", icon: "🛫", desc: "17:10 抵達台灣桃園機場 T1。平安到家。", price: "Flight GK55", imgUrl: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=600", imgText: "歸途航班", imgSub: "FLYING HOME" }
                    ],
                    food: ["丸善食肉店 (和牛串)", "星乃珈琲店", "老爺爺起司蛋糕 (難波本店)", "Komeda's Coffee"],
                    backup: ["LIFE 超市 / 玉出超市 (前晚採購)", "心齋橋藥妝最後補貨"]
                }
            ];

            const currentDayData = itinerary.find(d => d.id === activeTab);

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-24">
                    <header className="text-center my-6">
                        <h1 className="text-3xl font-bold text-pink-500 mb-2">2026 京阪回憶製造所</h1>
                        <p className="text-gray-500 text-sm italic font-bold">5 Days 4 Nights Itinerary</p>
                    </header>

                    {/* Tools Section - 01.html 的設計，並換上正確的 Gemini 連結 */}
                    <section className="bg-white p-4 rounded-2xl border-2 border-gray-800 shadow-lg mb-6">
                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label className="text-xs text-gray-400 block mb-1 font-bold">日圓 JPY</label>
                                <input 
                                    type="number" 
                                    className="w-full border-2 border-gray-200 rounded-lg p-2 outline-none font-bold text-pink-500 focus:border-pink-400"
                                    placeholder="¥金額"
                                    value={jpyAmount}
                                    onChange={(e) => {setJpyAmount(e.target.value); setTwdAmount(e.target.value ? Math.round(e.target.value * exchangeRate) : '');}}
                                />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400 block mb-1 font-bold">台幣 TWD (x{exchangeRate})</label>
                                <input type="text" className="w-full border-2 border-gray-100 bg-gray-50 rounded-lg p-2 font-bold text-gray-600" readOnly value={twdAmount ? `$ ${twdAmount}` : ''}/>
                            </div>
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                            <button onClick={() => window.open("https://gemini.google.com/gem/1f4ApPXxyWzwesGE82e2SH11hKhbxqqq1?usp=sharing", "_blank")} className="text-xs p-2 bg-blue-50 text-blue-600 rounded-lg border border-blue-200 font-bold active:bg-blue-100 transition-colors">🏮 即時翻譯</button>
                            <button onClick={() => window.open("https://gemini.google.com/gem/1fa0tVzBdpjJEAEjPYv0TANt8MT7cYuan?usp=sharing", "_blank")} className="text-xs p-2 bg-green-50 text-green-600 rounded-lg border border-green-200 font-bold active:bg-green-100 transition-colors">🍱 菜單解讀</button>
                            <button onClick={() => window.open("https://gemini.google.com/gem/1mBVkQ0InL1gPdhZy6Np2ZJCSl6X3cGu7?usp=sharing", "_blank")} className="text-xs p-2 bg-purple-50 text-purple-600 rounded-lg border border-purple-200 font-bold active:bg-purple-100 transition-colors">🗺️ 即時導遊</button>
                        </div>
                    </section>

                    {/* Navigation - Fixed Scrolling & Clipping for 01.html */}
                    <div className="w-full overflow-x-auto mb-4 pb-2 scrollbar-hide" style={{ WebkitOverflowScrolling: 'touch' }}>
                        <div className="flex gap-2 w-max px-1 py-1">
                            <button 
                                onClick={() => setActiveTab('entry')} 
                                className={`shrink-0 px-5 py-2 rounded-xl font-bold border-2 border-gray-800 transition-all ${activeTab === 'entry' ? 'tab-active' : 'bg-white text-gray-600 shadow-sm'}`}
                            >
                                🛃 出發資訊
                            </button>
                            <button 
                                onClick={() => setActiveTab('checklist')} 
                                className={`shrink-0 px-5 py-2 rounded-xl font-bold border-2 border-gray-800 transition-all ${activeTab === 'checklist' ? 'tab-active' : 'bg-white text-gray-600 shadow-sm'}`}
                            >
                                💼 行前清單
                            </button>
                            {itinerary.map(d => (
                                <button 
                                    key={d.id} 
                                    onClick={() => setActiveTab(d.id)} 
                                    className={`shrink-0 px-5 py-2 rounded-xl font-bold border-2 border-gray-800 transition-all ${activeTab === d.id ? 'tab-active' : 'bg-white text-gray-600 shadow-sm'}`}
                                >
                                    {d.fullDate}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Content Area - 01.html 的卡片架構 */}
                    <div className="bg-white p-6 rounded-2xl border-2 border-gray-800 shadow-xl min-h-[400px]">
                        {activeTab === 'entry' ? (
                            <div className="animate-fade-in">
                                <h2 className="text-2xl font-bold text-blue-500 mb-6 flex items-center gap-2">🛃 出發與入境資訊</h2>

                                {/* Hotel Info */}
                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-6 relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 opacity-10 text-6xl rotate-12">🏨</div>
                                    <h3 className="font-bold text-blue-800 mb-3 flex items-center gap-2 relative z-10">
                                        住宿飯店 (填寫入境卡用)
                                    </h3>
                                    <div className="text-sm text-blue-900 space-y-2 relative z-10 font-bold">
                                        <p><span className="bg-blue-200 px-1 rounded text-blue-800">名稱</span> VIA INN Shinsaibashi</p>
                                        <p className="leading-relaxed"><span className="bg-blue-200 px-1 rounded text-blue-800">地址</span> 〒542-0086 大阪市中央區西心齋橋 1-10-15</p>
                                        <p><span className="bg-blue-200 px-1 rounded text-blue-800">電話</span> 06-6121-5489</p>
                                        <p><span className="bg-blue-200 px-1 rounded text-blue-800">提醒</span> 現場需另付大阪府住宿稅 (約 100~300 日圓/人)</p>
                                    </div>
                                    <button 
                                        onClick={() => window.open('https://www.google.com/maps/search/?api=1&query=VIA+INN+Shinsaibashi', '_blank')}
                                        className="mt-4 bg-white text-blue-600 text-xs px-4 py-1.5 rounded-full font-bold border border-blue-300 shadow-sm active:scale-95 transition-transform"
                                    >
                                        📍 飯店地圖導航
                                    </button>
                                </div>

                                {/* Outbound Flight */}
                                <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 mb-4">
                                    <h3 className="font-bold text-sky-800 mb-2 flex items-center gap-2">🛫 去程航班 (5/25)</h3>
                                    <div className="text-sm text-sky-900 space-y-1">
                                        <p className="font-bold text-base text-sky-700 bg-white inline-block px-2 py-0.5 rounded border border-sky-100 mb-1">長榮航空 BR132</p>
                                        <div className="flex justify-between items-center bg-white p-2 rounded-lg border border-sky-100">
                                            <div className="text-center">
                                                <p className="font-bold text-lg">08:20</p>
                                                <p className="text-[10px] font-bold">TPE 第2航廈</p>
                                            </div>
                                            <div className="text-sky-300">✈️</div>
                                            <div className="text-center">
                                                <p className="font-bold text-lg">11:55</p>
                                                <p className="text-[10px] font-bold">KIX 第1航廈</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Inbound Flight */}
                                <div className="bg-purple-50 p-4 rounded-xl border border-purple-200 mb-6">
                                    <h3 className="font-bold text-purple-800 mb-2 flex items-center gap-2">🛬 回程航班 (5/29)</h3>
                                    <div className="text-sm text-purple-900 space-y-1">
                                        <p className="font-bold text-base text-purple-700 bg-white inline-block px-2 py-0.5 rounded border border-purple-100 mb-1">捷星航空 GK55</p>
                                        <div className="flex justify-between items-center bg-white p-2 rounded-lg border border-purple-100">
                                            <div className="text-center">
                                                <p className="font-bold text-lg">14:50</p>
                                                <p className="text-[10px] font-bold">KIX 第1航廈</p>
                                            </div>
                                            <div className="text-purple-300">✈️</div>
                                            <div className="text-center">
                                                <p className="font-bold text-lg">17:10</p>
                                                <p className="text-[10px] font-bold">TPE 第1航廈</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Rules */}
                                <div className="bg-red-50 p-4 rounded-xl border-2 border-red-200">
                                    <h3 className="font-bold text-red-600 mb-2">⚠️ 2026 行李與電池新規</h3>
                                    <div className="text-xs text-red-800 space-y-2 font-bold">
                                        <p>• 長榮：託運 23kg / 手提 7kg</p>
                                        <p>• 捷星：手提 7kg (嚴格二秤)，託運依購買額度</p>
                                        <p className="border-t border-red-200 pt-2 text-red-700">🔋 行動電源禁令：禁止託運。航程中禁止使用、機上嚴禁充電。</p>
                                    </div>
                                </div>
                            </div>

                        ) : activeTab === 'checklist' ? (
                            <div>
                                <h2 className="text-2xl font-bold text-orange-500 mb-6 flex items-center gap-2">🧳 行前檢查清單</h2>
                                {checklistData.map((cat, i) => (
                                    <div key={i} className="mb-6">
                                        <h3 className="font-bold text-gray-700 border-b-2 border-orange-100 mb-3 pb-1 text-sm">{cat.category}</h3>
                                        {cat.items.map(item => (
                                            <div key={item.id} className="flex items-center gap-3 mb-3 cursor-pointer" onClick={() => toggleCheck(item.id)}>
                                                <input type="checkbox" checked={checkedItems[item.id] || false} readOnly />
                                                <span className={`font-bold ${checkedItems[item.id] ? 'strikethrough text-gray-300' : 'text-gray-600'}`}>{item.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div>
                                <div className="mb-8">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <span className="text-orange-400 font-bold bg-orange-50 px-3 py-1 rounded-full text-xs inline-block mb-2">
                                                {currentDayData.fullDate}
                                            </span>
                                            <h2 className="text-2xl font-bold text-pink-600 tracking-tight">Day {currentDayData.day}: {currentDayData.title}</h2>
                                        </div>
                                    </div>
                                    <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-2 text-xs font-bold text-gray-600">
                                        <div className="bg-gray-50 p-2 rounded-lg border border-gray-100">🚶 預估強度：{currentDayData.intensity}</div>
                                        <div className="bg-gray-50 p-2 rounded-lg border border-gray-100">💰 交通預算：{currentDayData.budget}</div>
                                        <div className="bg-orange-50 p-2 rounded-lg border border-orange-100 text-orange-600">🌤️ 天氣狀況：{currentDayData.weather}</div>
                                        <div className="bg-blue-50 p-2 rounded-lg border border-blue-100 text-blue-600">👕 建議穿搭：{currentDayData.outfit}</div>
                                    </div>
                                </div>

                                {currentDayData.spots.map((spot, idx) => (
                                    <div key={idx} className="spot-card">
                                        <div className="inline-block bg-orange-100 text-orange-600 text-[10px] font-bold px-3 py-0.5 rounded-full mb-3 shadow-sm border border-orange-200">
                                            {spot.time}
                                        </div>
                                        <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-2">
                                            <span className="text-2xl">{spot.icon}</span> {spot.name}
                                        </h3>
                                        
                                        <div className="text-sm space-y-2 text-gray-600">
                                            <p className="flex items-start gap-2 leading-relaxed">
                                                <span className="flex-shrink-0 text-orange-300">📝</span> 
                                                <span className="font-bold">{spot.desc}</span>
                                            </p>
                                            <p className="flex items-center gap-2">
                                                <span className="flex-shrink-0 text-orange-300">🎫</span> 
                                                <span className="text-orange-500 font-bold">{spot.price}</span>
                                            </p>
                                            {spot.note && (
                                                <div className="flex items-start gap-2 text-red-500 bg-red-50 p-2.5 rounded-xl text-xs border border-red-200 font-bold animate-pulse">
                                                    <span className="flex-shrink-0">🚨</span> 
                                                    <span>{spot.note}</span>
                                                </div>
                                            )}
                                        </div>

                                        {spot.map && (
                                            <button 
                                                onClick={() => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(spot.map)}`, '_blank')}
                                                className="bg-green-50 text-green-600 text-xs px-5 py-2 rounded-full mt-4 mb-2 font-bold border-2 border-green-200 flex items-center gap-2 active:scale-95 transition-all shadow-sm"
                                            >
                                                📍 地圖導航
                                            </button>
                                        )}

                                        {/* Image Reference Section - 替換為實際圖片 */}
                                        <div className="img-container bg-white border-2 border-gray-100">
                                            <img src={spot.imgUrl} alt={spot.imgText} className="h-40 w-full object-cover" />
                                            <div className="p-3 bg-gray-50 border-t border-gray-100">
                                                <div className="text-sm font-bold text-gray-700"></div>
                                                <div className="text-[10px] text-orange-400 font-bold mt-1 uppercase tracking-widest">{spot.imgSub}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {/* 美食與備案推薦 */}
                                <div className="mt-8 pt-6 border-t-2 border-pink-100">
                                    <h3 className="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
                                        🍽️ 美食與備案推薦
                                    </h3>
                                    <div className="space-y-3">
                                        <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200">
                                            <p className="text-xs font-bold text-yellow-700 mb-2">主要美食建議：</p>
                                            <div className="flex flex-wrap gap-2">
                                                {currentDayData.food.map((f, i) => <span key={i} className="text-xs font-bold bg-white text-gray-700 px-3 py-1.5 rounded-lg shadow-sm border border-yellow-100">{f}</span>)}
                                            </div>
                                        </div>
                                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-200">
                                            <p className="text-xs font-bold text-blue-700 mb-2">備案景點 (避雨/彈性)：</p>
                                            <div className="flex flex-wrap gap-2">
                                                {currentDayData.backup.map((b, i) => <span key={i} className="text-xs font-bold bg-white text-gray-700 px-3 py-1.5 rounded-lg shadow-sm border border-blue-100">{b}</span>)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <footer className="mt-8 text-center text-[10px] text-gray-300 uppercase tracking-[0.2em] font-bold">
                        2026 Kansai Memory Factory | Version 1.11 | Created with ❤️
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
