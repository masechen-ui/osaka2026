<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 京阪回憶製造所 - 5天4夜行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #fff9f5;
            background-image: radial-gradient(#ffe4e6 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .tab-active {
            background-color: #ffc1cc !important;
            color: white !important;
            border-color: #ff8fa3 !important;
            box-shadow: 0 4px 6px -1px rgba(255, 143, 163, 0.5);
        }
        .strikethrough {
            text-decoration: line-through;
            color: #9ca3af;
        }
        input[type="checkbox"] {
            accent-color: #f472b6;
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }
        .spot-card {
            border-left: 2px solid #ffccd5;
            margin-left: 12px;
            padding-left: 24px;
            padding-bottom: 32px;
            position: relative;
        }
        .spot-card::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 0;
            width: 12px;
            height: 12px;
            background: #ff8fa3;
            border-radius: 50%;
            border: 2px solid white;
        }
        .img-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #eee;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        /* 美化捲軸，確保電腦版與手機版都能清楚看到滑動功能 */
        ::-webkit-scrollbar {
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fff0f2;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffc1cc;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('entry');
            const [jpyAmount, setJpyAmount] = useState('');
            const [twdAmount, setTwdAmount] = useState('');
            const [checkedItems, setCheckedItems] = useState({});
            const exchangeRate = 0.21;

            const toggleCheck = (id) => {
                setCheckedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const checklistData = [
                {
                    category: "📄 必帶證件與金錢",
                    items: [
                        { id: 'c1', text: "護照 (正本+影本)" },
                        { id: 'c2', text: "日幣現鈔 (大額+小額)" },
                        { id: 'c3', text: "信用卡" },
                        { id: 'c4', text: "日本網路 SIM 卡" }
                    ]
                },
                {
                    category: "🚗 租車必備 (爸爸專區)",
                    items: [
                        { id: 'c5', text: "台灣駕照正本 (不能過期)" },
                        { id: 'c6', text: "日文翻譯本正本" }
                    ]
                },
                {
                    category: "🍼 親子專區",
                    items: [
                        { id: 'c7', text: "小孩常備藥品 (感冒/退燒)" },
                        { id: 'c8', text: "小孩餐具與水壺" },
                        { id: 'c9', text: "小玩具" },
                        { id: 'c10', text: "平板電腦" }
                    ]
                }
            ];

            const itinerary = [
                {
                    id: 'day1',
                    day: 1,
                    fullDate: "5/25 (月) 星期一",
                    title: "啟程大阪 ＆ 動漫遊戲尋寶",
                    weather: "🌤️ 22°C - 26°C",
                    spots: [
                        { 
                            time: "11:55", 
                            name: "關西機場 (KIX)", 
                            icon: "✈️", 
                            desc: "抵達關西第一航廈，辦理入境並提領行李。",
                            price: "交通費約 ¥930 (南海電鐵)",
                            imgText: "抵達關西空港",
                            imgSub: "第一航廈 KIX"
                        },
                        { 
                            time: "15:00", 
                            name: "日本橋電電城", 
                            icon: "🎮", 
                            map: "日本橋電電城",
                            desc: "尋找懷舊遊戲、漫畫公仔周邊，體驗大阪秋葉原文化。",
                            price: "入店 免費",
                            imgText: "日本橋動漫街",
                            imgSub: "DEN DEN TOWN"
                        },
                        { 
                            time: "18:00", 
                            name: "道頓堀周邊探索", 
                            icon: "🏃", 
                            map: "道頓堀固力果",
                            desc: "在道頓堀與固力果跑跑人合照，周邊吃拉麵或章魚燒。",
                            price: "晚餐預算 自訂",
                            imgText: "道頓堀打卡",
                            imgSub: "固力果跑跑人"
                        }
                    ]
                },
                {
                    id: 'day2',
                    day: 2,
                    fullDate: "5/26 (火) 星期二",
                    title: "嵐山絕景 ＆ 心齋橋採購",
                    weather: "☀️ 18°C - 24°C",
                    spots: [
                        { 
                            time: "09:30", 
                            name: "嵯峨野觀光小火車", 
                            icon: "🚂", 
                            map: "嵯峨野觀光小火車",
                            desc: "搭乘復古小火車欣賞峽谷風光。",
                            price: "票價 ¥880",
                            imgText: "嵐山觀光小火車",
                            imgSub: "峽谷絕景"
                        },
                        { 
                            time: "10:30", 
                            name: "保津川渡船", 
                            icon: "🛶", 
                            map: "保津川下り",
                            desc: "由專業船夫撐篙，2 小時順流而下直達渡月橋。",
                            price: "票價 ¥6,000",
                            note: "🚨 需提早預約場次，峽谷瀑布超美！",
                            imgText: "保津川划船",
                            imgSub: "峽谷瀑布"
                        },
                        { 
                            time: "17:30", 
                            name: "心齋橋 PARCO / 大丸", 
                            icon: "🧸", 
                            map: "心齋橋PARCO",
                            desc: "朝聖吉伊卡哇 (PARCO 6F) 與 寶可夢中心 (大丸 9F)。",
                            price: "採買預算 自訂",
                            imgText: "心齋橋採購",
                            imgSub: "吉伊卡哇商店"
                        },
                        { 
                            time: "20:00", 
                            name: "力丸燒肉 (晚餐)", 
                            icon: "🥩", 
                            map: "力丸燒肉 難波湊町店",
                            desc: "血拼完的能量補充，國產牛吃到飽！",
                            price: "預算約 ¥4,000 / 人",
                            note: "🚨 第二天重點大餐！請準時前往。",
                            imgText: "力丸燒肉",
                            imgSub: "國產牛吃到飽"
                        }
                    ]
                },
                {
                    id: 'day3',
                    day: 3,
                    fullDate: "5/27 (水) 星期三",
                    title: "京都經典古都巡禮",
                    weather: "🔥 24°C - 29°C",
                    spots: [
                        { 
                            time: "09:30", 
                            name: "伏見稻荷大社", 
                            icon: "🦊", 
                            map: "伏見稻荷大社",
                            desc: "漫步千本鳥居，體驗壯觀的狐狸神社文化。",
                            price: "參拜 免費",
                            imgText: "伏見稻荷",
                            imgSub: "千本鳥居步道"
                        },
                        { 
                            time: "12:00", 
                            name: "清水寺 ＆ 二年坂", 
                            icon: "🏮", 
                            map: "清水寺",
                            desc: "必看清水舞台，並在二年坂、三年坂散策買伴手禮。",
                            price: "門票 ¥400",
                            imgText: "清水寺",
                            imgSub: "清水舞台景觀"
                        },
                        { 
                            time: "16:00", 
                            name: "祇園花見小路", 
                            icon: "🎎", 
                            map: "花見小路",
                            desc: "傍晚的花街非常有氣氛，有機會遇見舞伎。",
                            price: "漫步 免費",
                            imgText: "祇園花見小路",
                            imgSub: "傳統花街風情"
                        }
                    ]
                },
                {
                    id: 'day4',
                    day: 4,
                    fullDate: "5/28 (木) 星期四",
                    title: "大阪港灣 ＆ 新世界懷舊",
                    weather: "☁️ 21°C - 25°C",
                    spots: [
                        { 
                            time: "10:15", 
                            name: "大阪海遊館", 
                            icon: "🐋", 
                            map: "海遊館",
                            desc: "觀賞巨大的鯨鯊共游，全球最大級室內水族館。",
                            price: "門票 ¥2,700",
                            imgText: "海遊館",
                            imgSub: "巨大鯨鯊共游"
                        },
                        { 
                            time: "13:30", 
                            name: "聖瑪麗亞號遊船", 
                            icon: "⛵", 
                            map: "聖瑪麗亞號",
                            desc: "巡遊大阪港，持周遊卡免費搭乘。",
                            price: "周遊卡免費 (原¥1,600)",
                            imgText: "聖瑪麗亞號",
                            imgSub: "海洋風情巡航"
                        },
                        { 
                            time: "16:00", 
                            name: "通天閣 ＆ 串炸", 
                            icon: "🗼", 
                            map: "通天閣",
                            desc: "參觀大阪代表地標，並在下方的商店街吃串炸。",
                            price: "門票 ¥1,000 (周遊卡免)",
                            imgText: "通天閣",
                            imgSub: "新世界懷舊時光"
                        }
                    ]
                },
                {
                    id: 'day5',
                    day: 5,
                    fullDate: "5/29 (金) 星期五",
                    title: "黑門市場快閃 ＆ 歸途",
                    weather: "🌦️ 23°C - 26°C",
                    spots: [
                        { 
                            time: "09:15", 
                            name: "黑門市場早餐", 
                            icon: "🍣", 
                            map: "黑門市場",
                            desc: "最後的海鮮巡禮，現烤神戶牛、生魚片。",
                            price: "預算約 ¥2,500",
                            imgText: "黑門市場",
                            imgSub: "大阪人的廚房"
                        },
                        { 
                            time: "11:15", 
                            name: "啟程前往關西機場", 
                            icon: "🚋", 
                            map: "關西機場",
                            desc: "最晚此時務必從心齋橋站出發。",
                            price: "交通費約 ¥1,120",
                            imgText: "準備回台",
                            imgSub: "南海電鐵特急"
                        },
                        { 
                            time: "14:50", 
                            name: "捷星 GK55 起飛", 
                            icon: "🛫", 
                            desc: "抵達機場辦理報到，滿載而歸。",
                            price: "機場安檢 ＆ 免稅店",
                            imgText: "歸途航班",
                            imgSub: "滿載而歸"
                        }
                    ]
                }
            ];

            const currentDayData = itinerary.find(d => d.id === activeTab);

            const openGemini = () => window.open("https://gemini.google.com/", "_blank");

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-24">
                    <header className="text-center my-6">
                        <h1 className="text-3xl font-bold text-pink-500 mb-2">2026 京阪回憶製造所</h1>
                        <p className="text-gray-500 text-sm italic">5 Days 4 Nights Itinerary</p>
                    </header>

                    {/* Tools Section */}
                    <section className="bg-white p-4 rounded-2xl border-2 border-gray-800 shadow-lg mb-6">
                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label className="text-xs text-gray-400 block mb-1 font-bold">日圓 JPY</label>
                                <input 
                                    type="number" 
                                    className="w-full border-2 border-gray-200 rounded-lg p-2 outline-none font-bold text-pink-500"
                                    placeholder="¥金額"
                                    value={jpyAmount}
                                    onChange={(e) => {setJpyAmount(e.target.value); setTwdAmount((e.target.value * exchangeRate).toFixed(0))}}
                                />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400 block mb-1 font-bold">台幣 TWD (x{exchangeRate})</label>
                                <input type="text" className="w-full border-2 border-gray-100 bg-gray-50 rounded-lg p-2 font-bold text-gray-600" readOnly value={twdAmount}/>
                            </div>
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                            <button onClick={openGemini} className="text-xs p-2 bg-blue-50 text-blue-600 rounded-lg border border-blue-200 font-bold active:bg-blue-100 transition-colors">🏮 翻譯助手</button>
                            <button onClick={openGemini} className="text-xs p-2 bg-green-50 text-green-600 rounded-lg border border-green-200 font-bold active:bg-green-100 transition-colors">🍱 菜單解讀</button>
                            <button onClick={openGemini} className="text-xs p-2 bg-purple-50 text-purple-600 rounded-lg border border-purple-200 font-bold active:bg-purple-100 transition-colors">🗺️ 即時導遊</button>
                        </div>
                    </section>

                    {/* Navigation - Fixed Scrolling & Clipping */}
                    <div className="w-full overflow-x-auto mb-4 pb-2">
                        <div className="flex gap-2 w-max px-1 py-1">
                            <button 
                                onClick={() => setActiveTab('entry')} 
                                className={`shrink-0 px-5 py-2 rounded-xl font-bold border-2 border-gray-800 transition-all ${activeTab === 'entry' ? 'tab-active' : 'bg-white text-gray-600 shadow-sm'}`}
                            >
                                🛃 入境
                            </button>
                            <button 
                                onClick={() => setActiveTab('checklist')} 
                                className={`shrink-0 px-5 py-2 rounded-xl font-bold border-2 border-gray-800 transition-all ${activeTab === 'checklist' ? 'tab-active' : 'bg-white text-gray-600 shadow-sm'}`}
                            >
                                💼 行前
                            </button>
                            {itinerary.map(d => (
                                <button 
                                    key={d.id} 
                                    onClick={() => setActiveTab(d.id)} 
                                    className={`shrink-0 px-5 py-2 rounded-xl font-bold border-2 border-gray-800 transition-all ${activeTab === d.id ? 'tab-active' : 'bg-white text-gray-600 shadow-sm'}`}
                                >
                                    {d.fullDate}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Content Area */}
                    <div className="bg-white p-6 rounded-2xl border-2 border-gray-800 shadow-xl min-h-[400px]">
                        {activeTab === 'entry' ? (
                            <div className="animate-fade-in">
                                <h2 className="text-2xl font-bold text-blue-500 mb-6 flex items-center gap-2">🛃 出發與入境資訊</h2>

                                {/* Hotel Info */}
                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-6 relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 opacity-10 text-6xl rotate-12">🏨</div>
                                    <h3 className="font-bold text-blue-800 mb-3 flex items-center gap-2 relative z-10">
                                        住宿飯店 (填寫入境卡用)
                                    </h3>
                                    <div className="text-sm text-blue-900 space-y-2 relative z-10">
                                        <p><span className="font-bold bg-blue-200 px-1 rounded text-blue-800">名稱</span> VIA INN Shinsaibashi（心齋橋）</p>
                                        <p className="leading-relaxed"><span className="font-bold bg-blue-200 px-1 rounded text-blue-800">地址</span> 〒542-0086<br/>大阪府大阪市中央區西心齋橋 1-10-15</p>
                                        <p><span className="font-bold bg-blue-200 px-1 rounded text-blue-800">電話</span> 06-6121-5489</p>
                                        <p><span className="font-bold bg-blue-200 px-1 rounded text-blue-800">交通</span> 地鐵御堂筋線「心齋橋站」步行約 2 分鐘。</p>
                                    </div>
                                    <button 
                                        onClick={() => window.open('https://www.google.com/maps/search/?api=1&query=VIA+INN+Shinsaibashi', '_blank')}
                                        className="mt-4 bg-white text-blue-600 text-xs px-4 py-1.5 rounded-full font-bold border border-blue-300 shadow-sm active:scale-95 transition-transform"
                                    >
                                        📍 飯店地圖導航
                                    </button>
                                </div>

                                {/* Outbound Flight */}
                                <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 mb-4">
                                    <h3 className="font-bold text-sky-800 mb-2 flex items-center gap-2">🛫 去程航班 (5/25)</h3>
                                    <div className="text-sm text-sky-900 space-y-1">
                                        <p className="font-bold text-base text-sky-700 bg-white inline-block px-2 py-0.5 rounded border border-sky-100 mb-1">長榮航空 BR132</p>
                                        <div className="flex justify-between items-center bg-white p-2 rounded-lg border border-sky-100">
                                            <div className="text-center">
                                                <p className="font-bold text-lg">08:20</p>
                                                <p className="text-[10px]">TPE 第2航廈</p>
                                            </div>
                                            <div className="text-sky-300">✈️</div>
                                            <div className="text-center">
                                                <p className="font-bold text-lg">11:55</p>
                                                <p className="text-[10px]">KIX 第1航廈</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Inbound Flight */}
                                <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200 mb-2">
                                    <h3 className="font-bold text-emerald-800 mb-2 flex items-center gap-2">🛬 回程航班 (5/29)</h3>
                                    <div className="text-sm text-emerald-900 space-y-1">
                                        <p className="font-bold text-base text-emerald-700 bg-white inline-block px-2 py-0.5 rounded border border-emerald-100 mb-1">捷星航空 GK55</p>
                                        <div className="flex justify-between items-center bg-white p-2 rounded-lg border border-emerald-100">
                                            <div className="text-center">
                                                <p className="font-bold text-lg">14:50</p>
                                                <p className="text-[10px]">KIX 第1航廈</p>
                                            </div>
                                            <div className="text-emerald-300">✈️</div>
                                            <div className="text-center">
                                                <p className="font-bold text-lg">17:10</p>
                                                <p className="text-[10px]">TPE 第1航廈</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <p className="text-[10px] text-gray-400 mt-4 italic">* 填寫 Visit Japan Web 海關申報時，請務必參考上方住宿與航班資訊。</p>
                            </div>

                        ) : activeTab === 'checklist' ? (
                            <div>
                                <h2 className="text-2xl font-bold text-orange-500 mb-6 flex items-center gap-2">🧳 行前檢查清單</h2>
                                {checklistData.map((cat, i) => (
                                    <div key={i} className="mb-6">
                                        <h3 className="font-bold text-gray-700 border-b-2 border-orange-100 mb-3 pb-1 text-sm">{cat.category}</h3>
                                        {cat.items.map(item => (
                                            <div key={item.id} className="flex items-center gap-3 mb-3 cursor-pointer" onClick={() => toggleCheck(item.id)}>
                                                <input type="checkbox" checked={checkedItems[item.id] || false} readOnly />
                                                <span className={`font-bold ${checkedItems[item.id] ? 'strikethrough text-gray-300' : 'text-gray-600'}`}>{item.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div>
                                <div className="mb-8">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <span className="text-orange-400 font-bold bg-orange-50 px-3 py-1 rounded-full text-xs inline-block mb-2">
                                                {currentDayData.fullDate}
                                            </span>
                                            <h2 className="text-2xl font-bold text-pink-600 tracking-tight">Day {currentDayData.day}: {currentDayData.title}</h2>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-xs bg-yellow-100 text-yellow-600 px-2 py-1 rounded-lg border border-yellow-200 font-bold">
                                                {currentDayData.weather}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                {currentDayData.spots.map((spot, idx) => (
                                    <div key={idx} className="spot-card">
                                        <div className="inline-block bg-orange-100 text-orange-600 text-[10px] font-bold px-3 py-0.5 rounded-full mb-3 shadow-sm border border-orange-200">
                                            {spot.time}
                                        </div>
                                        <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-2">
                                            <span className="text-2xl">{spot.icon}</span> {spot.name}
                                        </h3>
                                        
                                        <div className="text-sm space-y-2 text-gray-600">
                                            <p className="flex items-start gap-2 leading-relaxed">
                                                <span className="flex-shrink-0 text-orange-300">📝</span> 
                                                <span className="font-medium">{spot.desc}</span>
                                            </p>
                                            <p className="flex items-center gap-2">
                                                <span className="flex-shrink-0 text-orange-300">🎫</span> 
                                                <span className="text-orange-500 font-bold">{spot.price}</span>
                                            </p>
                                            {spot.note && (
                                                <div className="flex items-start gap-2 text-red-500 bg-red-50 p-2.5 rounded-xl text-xs border border-red-100 font-bold animate-pulse">
                                                    <span className="flex-shrink-0">🚨</span> 
                                                    <span>{spot.note}</span>
                                                </div>
                                            )}
                                        </div>

                                        {spot.map && (
                                            <button 
                                                onClick={() => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(spot.map)}`, '_blank')}
                                                className="bg-green-50 text-green-600 text-xs px-5 py-2 rounded-full mt-4 font-bold border-2 border-green-200 flex items-center gap-2 active:scale-95 transition-all shadow-sm"
                                            >
                                                📍 地圖導航
                                            </button>
                                        )}

                                        {/* Image Reference Section */}
                                        <div className="img-container bg-white border-2 border-gray-100">
                                            <div className="h-32 w-full flex items-center justify-center text-gray-100 bg-gray-50 relative">
                                                <span className="text-6xl opacity-20">{spot.icon}</span>
                                                <div className="absolute inset-0 bg-gradient-to-t from-pink-500/10 to-transparent"></div>
                                                <div className="absolute bottom-2 right-2 text-[10px] text-gray-300 italic">Reference Image</div>
                                            </div>
                                            <div className="p-3">
                                                <div className="text-sm font-bold text-gray-700">{spot.imgText}</div>
                                                <div className="text-[10px] text-orange-400 font-bold mt-1 uppercase tracking-widest">{spot.imgSub}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    <footer className="mt-8 text-center text-[10px] text-gray-300 uppercase tracking-[0.2em] font-bold">
                        2026 Kansai Memory Factory | Created with ❤️
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
